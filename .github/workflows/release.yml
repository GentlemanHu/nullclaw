name: Release

env:
  ANDROID_API_LEVEL: 24
  ANDROID_NDK_VERSION: 29.0.14206865
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ZIG_VERSION: "0.15.2"

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_target:
        description: '选择编译的平台 (all/android/linux/macos/windows)'
        required: true
        default: 'android'
        type: choice
        options:
          - all
          - android
          - linux
          - macos
          - windows

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: android-aarch64
            zig_target: aarch64-linux.3.10-musl
            ext: ""
          - os: ubuntu-latest
            target: android-armv7a
            zig_target: arm-linux.3.10-musleabihf
            ext: ""
          - os: ubuntu-latest
            target: linux-x86_64
            zig_target: x86_64-linux-musl
            zig_cpu: ""
            ext: ""
          - os: ubuntu-latest
            target: linux-aarch64
            zig_target: aarch64-linux-musl
            zig_cpu: ""
            ext: ""
          - os: ubuntu-latest
            target: linux-arm32-gnu
            zig_target: arm-linux-gnueabihf
            zig_cpu: ""
            ext: ""
          - os: ubuntu-latest
            target: linux-arm32-musl
            zig_target: arm-linux-musleabihf
            zig_cpu: ""
            ext: ""
          - os: ubuntu-latest
            target: linux-riscv64
            zig_target: riscv64-linux-musl
            zig_cpu: ""
            ext: ""
          - os: ubuntu-latest
            target: android-aarch64
            zig_target: aarch64-linux-android
            zig_cpu: ""
            ext: ""
          - os: ubuntu-latest
            target: android-armv7
            zig_target: arm-linux-androideabi
            zig_cpu: baseline+v7a
            ext: ""
          - os: ubuntu-latest
            target: android-x86_64
            zig_target: x86_64-linux-android
            zig_cpu: ""
            ext: ""
          - os: macos-latest
            target: macos-aarch64
            zig_target: aarch64-macos
            zig_cpu: ""
            ext: ""
          - os: macos-latest
            target: macos-x86_64
            zig_target: x86_64-macos
            zig_cpu: ""
            ext: ""
          - os: windows-latest
            target: windows-x86_64
            zig_target: x86_64-windows
            zig_cpu: ""
            ext: ".exe"
          - os: windows-latest
            target: windows-aarch64
            zig_target: aarch64-windows
            zig_cpu: ""
            ext: ".exe"

    steps:
      - uses: actions/checkout@v6

      - name: Check trigger matrix execution
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.build_target }}" != "all" ]; then
            if [[ ! "${{ matrix.target }}" == *"${{ inputs.build_target }}"* ]]; then
              echo "skip=true" >> $GITHUB_ENV
              exit 0
            fi
          fi
          echo "skip=false" >> $GITHUB_ENV

      - name: Install Zig 0.15.2
        if: env.skip != 'true'
        uses: mlugg/setup-zig@v2
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: startsWith(matrix.target, 'android-')
        uses: android-actions/setup-android@v3
        with:
          packages: ''

      - name: Install Android NDK
        if: startsWith(matrix.target, 'android-')
        run: sdkmanager --install "ndk;${ANDROID_NDK_VERSION}"

      - name: Export Android NDK paths
        if: startsWith(matrix.target, 'android-')
        run: |
          NDK_ROOT="${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"
          SYSROOT="${NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          LIBC_FILE="$RUNNER_TEMP/android-libc-${{ matrix.target }}.txt"
          echo "ANDROID_NDK_ROOT=${NDK_ROOT}" >> "$GITHUB_ENV"
          echo "ZIG_ANDROID_SYSROOT=${SYSROOT}" >> "$GITHUB_ENV"
          echo "ZIG_ANDROID_LIBC_FILE=${LIBC_FILE}" >> "$GITHUB_ENV"
          cat > "${LIBC_FILE}" <<EOF
          include_dir=${SYSROOT}/usr/include/${{ matrix.zig_target }}
          sys_include_dir=${SYSROOT}/usr/include
          crt_dir=${SYSROOT}/usr/lib/${{ matrix.zig_target }}/${ANDROID_API_LEVEL}
          msvc_lib_dir=
          kernel32_lib_dir=
          gcc_dir=
          EOF

      - name: Build ReleaseSmall
        if: env.skip != 'true'
        run: zig build -Doptimize=ReleaseSmall ${{ matrix.zig_target && format('-Dtarget={0}', matrix.zig_target) || '' }}

      - name: Upload artifact
        if: env.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nullclaw-${{ matrix.target }}
          path: zig-out/bin/nullclaw${{ matrix.ext }}

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 仅 Tag 或手动时都可以打包（根据触发类型处理）
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/download-artifact@v8

      - name: Rename binaries
        run: |
          [ -f nullclaw-android-aarch64/nullclaw ] && mv nullclaw-android-aarch64/nullclaw nullclaw-android-aarch64.bin || true
          [ -f nullclaw-android-armv7a/nullclaw ] && mv nullclaw-android-armv7a/nullclaw nullclaw-android-armv7a.bin || true
          [ -f nullclaw-linux-x86_64/nullclaw ] && mv nullclaw-linux-x86_64/nullclaw nullclaw-linux-x86_64.bin || true
          [ -f nullclaw-linux-aarch64/nullclaw ] && mv nullclaw-linux-aarch64/nullclaw nullclaw-linux-aarch64.bin || true
          [ -f nullclaw-linux-riscv64/nullclaw ] && mv nullclaw-linux-riscv64/nullclaw nullclaw-linux-riscv64.bin || true
          [ -f nullclaw-macos-aarch64/nullclaw ] && mv nullclaw-macos-aarch64/nullclaw nullclaw-macos-aarch64.bin || true
          [ -f nullclaw-macos-x86_64/nullclaw ] && mv nullclaw-macos-x86_64/nullclaw nullclaw-macos-x86_64.bin || true
          [ -f nullclaw-windows-x86_64/nullclaw.exe ] && mv nullclaw-windows-x86_64/nullclaw.exe nullclaw-windows-x86_64.exe || true
          [ -f nullclaw-windows-aarch64/nullclaw.exe ] && mv nullclaw-windows-aarch64/nullclaw.exe nullclaw-windows-aarch64.exe || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            nullclaw-android-aarch64.bin
            nullclaw-android-armv7a.bin
            nullclaw-linux-x86_64.bin
            nullclaw-linux-aarch64.bin
            nullclaw-linux-arm32-gnu.bin
            nullclaw-linux-arm32-musl.bin
            nullclaw-linux-riscv64.bin
            nullclaw-android-aarch64.bin
            nullclaw-android-armv7.bin
            nullclaw-android-x86_64.bin
            nullclaw-macos-aarch64.bin
            nullclaw-macos-x86_64.bin
            nullclaw-windows-x86_64.exe
            nullclaw-windows-aarch64.exe
          generate_release_notes: true


